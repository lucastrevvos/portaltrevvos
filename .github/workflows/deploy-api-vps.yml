name: Deploy VPS

on:
  push:
    branches:
      - master
    paths:
      - "apps/api/**"
      - "apps/portal/**"
      - "apps/km-one-connect/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Dockerfile.api"
      - "Dockerfile.portal"
      - "deploy/vps/**"
      - ".github/workflows/deploy-api-vps.yml"

  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Trevvos VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/vps_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cd /opt/portaltrevvos && git pull --ff-only origin master && ./deploy/vps/deploy-all.sh"
