name: Deploy API to VPS

on:
  push:
    branches:
      - master
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Dockerfile.api"
      - "deploy/vps/**"
      - ".github/workflows/deploy-api-vps.yml"

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Trevvos API
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/vps_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cd /opt/portaltrevvos && ./deploy/vps/deploy.sh"
