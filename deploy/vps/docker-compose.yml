services:
  api:
    build:
      context: /opt/portaltrevvos
      dockerfile: Dockerfile.api
    container_name: trevvos-api
    restart: unless-stopped
    env_file:
      - /opt/trevvos/secrets/api.env
    expose:
      - "3333"

  portal:
    build:
      context: /opt/portaltrevvos
      dockerfile: Dockerfile.portal
    container_name: trevvos-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    depends_on:
      - api

  caddy:
    image: caddy:2
    container_name: trevvos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/trevvos/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - portal

volumes:
  caddy_data:
  caddy_config:
